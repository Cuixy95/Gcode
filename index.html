<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>绕线机代码生成器 | 自动命名</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, 'Microsoft YaHei', sans-serif; background: #eef2f5; padding: 12px; font-size: 14px; }
        .container { max-width: 560px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); overflow: hidden; }
        .header { background: linear-gradient(135deg, #2c7da0, #1f5068); color: white; text-align: center; padding: 18px 12px; }
        .header h1 { font-size: 1.4rem; font-weight: 600; }
        .form-section { padding: 16px 18px; border-bottom: 1px solid #e9ecef; }
        .section-title { font-size: 0.9rem; font-weight: 700; color: #1f5068; margin-bottom: 12px; padding-left: 6px; border-left: 4px solid #2c7da0; }
        .compact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 12px; margin-bottom: 12px; }
        .compact-item { display: flex; flex-direction: column; gap: 4px; }
        .compact-item label { font-weight: 600; font-size: 0.75rem; color: #2c3e4e; }
        .compact-item input { padding: 8px 10px; border: 1px solid #ced4da; border-radius: 12px; font-size: 0.85rem; }
        .compact-item input:focus { border-color: #2c7da0; outline: none; }
        .compact-tip { font-size: 0.7rem; color: #6c757d; }
        .form-row { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px; margin-bottom: 12px; }
        .form-row label { min-width: 72px; font-weight: 600; font-size: 0.8rem; }
        .form-row input { flex: 1; padding: 8px 10px; border: 1px solid #ced4da; border-radius: 12px; font-size: 0.85rem; }
        .tip { font-size: 0.7rem; color: #6c757d; }
        .checkbox-row { display: flex; align-items: center; gap: 10px; margin: 10px 0 8px; }
        input[type="checkbox"] { width: 18px; height: 18px; accent-color: #2c7da0; }
        .filename-section { background: #f8fafc; padding: 14px 18px; border-top: 1px solid #e2e8f0; }
        .filename-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .filename-row label { font-weight: 700; font-size: 0.85rem; }
        .filename-input { flex: 1; padding: 8px 12px; border-radius: 40px; border: 1px solid #cbd5e1; font-size: 0.85rem; }
        .auto-name-hint { font-size: 0.7rem; color: #2c7da0; margin-top: 6px; text-align: center; cursor: pointer; }
        .auto-name-hint:hover { text-decoration: underline; }
        .button-section { padding: 20px 18px; background: white; }
        .generate-btn { background: linear-gradient(100deg, #2c7da0, #1e5a74); border: none; padding: 12px; font-weight: 700; font-size: 1rem; border-radius: 40px; width: 100%; color: white; cursor: pointer; }
        .generate-btn:active { transform: scale(0.97); }
        .status { text-align: center; font-size: 0.8rem; margin-top: 12px; padding: 6px; border-radius: 30px; display: none; }
        .status.error { background: #ffe3e3; color: #c7362b; }
        .status.success { background: #e0f2e9; color: #1e6f3f; }
        @media (max-width: 480px) { .compact-grid { grid-template-columns: 1fr; } .form-row { flex-direction: column; } .form-row label { min-width: auto; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>⚙️ 绕线机代码生成器</h1></div>
    
    <div class="form-section">
        <div class="section-title">基础参数</div>
        <div class="compact-grid">
            <div class="compact-item"><label>线径 / 密度 (mm)</label><input type="number" id="wdia" step="0.01" value="0.15"><div class="compact-tip">数值越小越紧密</div></div>
            <div class="compact-item"><label>总层数</label><input type="number" id="layers" value=""><div class="compact-tip">绕制层数</div></div>
            <div class="compact-item"><label>层宽度 (mm)</label><input type="number" id="width" step="0.1" value=""><div class="compact-tip">单层宽度</div></div>
            <div class="compact-item"><label>默认速度 F</label><input type="number" id="feed" value="3000"><div class="compact-tip"></div></div>
        </div>
        <div class="checkbox-row"><input type="checkbox" id="negStart" checked><label>🔁 从右往左绑制</label></div>
    </div>
    
    <div class="form-section">
        <div class="section-title">高级控制</div>
        <div class="form-row"><label>⏸️ 暂停层号</label><input type="text" id="pauseLayers" value="1"><div class="tip">用+分隔，例如 1+3</div></div>
        <div class="form-row">
            <label>📌 Y轴暂停宽度</label>
            <input type="number" id="pauseYWidth" step="0.1" value="1.0" style="flex:0.5; min-width:80px;">
            <div class="tip">第一层Y轴移动到该值时暂停 (mm)</div>
        </div>
        <div class="checkbox-row"><input type="checkbox" id="pauseAtYWidth" checked><label>启用Y轴宽度暂停</label></div>
        <div class="form-row"><label>✨ 特殊宽度设置</label><input type="text" id="special" value=""><div class="tip">格式: 层号=宽度=F速度，/分隔</div></div>
        <div class="form-row"><label>📍 结束停留 Y</label><input type="number" id="endY" value="60" step="1"><div class="tip">绕线结束后Y轴坐标</div></div>
    </div>
    
    <div class="filename-section">
        <div class="filename-row"><label>📄 文件名</label><input type="text" id="fname" class="filename-input" value="" placeholder="留空自动生成"></div>
        <div class="auto-name-hint" id="autoNamePreview">✨ 预览: 15c4k45.txt</div>
    </div>
    
    <div class="button-section">
        <div id="statusMsg" class="status"></div>
        <button class="generate-btn" id="genBtn">📁 生成并保存 G-code</button>
    </div>
</div>

<script>
    (function() {
        const $ = (id) => document.getElementById(id);
        const statusDiv = $('statusMsg');
        
        function setStatus(msg, isError = false) {
            statusDiv.textContent = msg;
            statusDiv.className = `status ${isError ? 'error' : 'success'}`;
            statusDiv.style.display = 'block';
            if (!isError) setTimeout(() => { if(statusDiv) statusDiv.style.display = 'none'; }, 2800);
        }
        function hideStatus() { statusDiv.style.display = 'none'; }
        
        function parsePauseLayers(raw, total) {
            if (!raw || !raw.trim()) return [];
            return [...new Set(
                raw.split('+').map(p => parseInt(p.trim())).filter(n => !isNaN(n) && n >= 1 && n <= total)
            )].sort((a,b)=>a-b);
        }
        
        function parseSpecialLayers(str) {
            const map = {};
            if (!str || !str.trim()) return map;
            str.split('/').forEach(seg => {
                seg = seg.trim();
                if (!seg) return;
                const parts = seg.split('=');
                if (parts.length >= 3) {
                    const layer = parseInt(parts[0].trim());
                    const width = parseFloat(parts[1].trim());
                    let feedRaw = parts[2].trim().toUpperCase();
                    if (feedRaw.startsWith('F')) feedRaw = feedRaw.slice(1);
                    const feed = parseInt(feedRaw);
                    if (!isNaN(layer) && !isNaN(width) && !isNaN(feed) && layer>0) {
                        map[layer] = { width, feed };
                    }
                }
            });
            return map;
        }
        
        /**
         * 根据线径、层数、层宽度自动生成文件名
         * 规则：线径*100 + "c" + 层数 + "k" + 宽度*10 + ".txt"
         */
        function autoGenerateFilename(wireDia, layers, width) {
            let wireCode = Math.round(wireDia * 100);
            let widthCode = Math.round(width * 10);
            return `${wireCode}c${layers}k${widthCode}.txt`;
        }
        
        // 实时预览自动文件名
        function updateFileNamePreview() {
            const wireRaw = $('wdia').value;
            const layersRaw = $('layers').value;
            const widthRaw = $('width').value;
            
            if (wireRaw && layersRaw && widthRaw) {
                const wireDia = parseFloat(wireRaw);
                const layers = parseInt(layersRaw);
                const width = parseFloat(widthRaw);
                if (!isNaN(wireDia) && !isNaN(layers) && !isNaN(width) && wireDia > 0 && layers > 0 && width > 0) {
                    const preview = autoGenerateFilename(wireDia, layers, width).replace('.txt', '');
                    $('autoNamePreview').innerHTML = `✨ 自动命名预览: ${preview}.txt`;
                    return;
                }
            }
            $('autoNamePreview').innerHTML = `✨ 自动命名预览: (填写线径/层数/宽度)`;
        }
        
        /**
         * 核心：生成精简Gcode
         */
        function buildGcode(params) {
            const { wireDia, totalLayers, widthDef, feedDef, specialMap, endStayY, negativeStart, pauseAtYWidth, pauseYWidthValue } = params;
            const lines = [];
            lines.push(";绕线机代码 (精简合并版 - Y轴可变宽度暂停)");
            lines.push("G21 ; 毫米单位");
            lines.push("G91 ; 相对坐标模式");
            lines.push("; ========== 开始绕线 ==========");
            
            let currentDir = negativeStart ? -1 : 1;
            let totalX = 0;
            let totalY = 0;
            let pauseInsertedForLayer1 = false;
            
            for (let lay = 1; lay <= totalLayers; lay++) {
                let layerW = widthDef, layerF = feedDef;
                if (specialMap[lay]) {
                    layerW = specialMap[lay].width;
                    layerF = specialMap[lay].feed;
                }
                const turns = Math.floor(layerW / wireDia);
                if (turns <= 0) {
                    lines.push(`; 警告: 第${lay}层宽度${layerW} / 线径${wireDia} 圈数为0，跳过`);
                    continue;
                }
                if (lay > 1) currentDir = -currentDir;
                
                lines.push(`; -- 层 ${lay} | 宽=${layerW}mm | 圈=${turns} | F${layerF} 方向${currentDir > 0 ? '→' : '←'}`);
                
                let batchX = 0;
                let batchY = 0;
                let batchSpeed = layerF;
                
                let flushBatch = (insertPause = false, pausePosMm = null) => {
                    if (batchX !== 0 || batchY !== 0) {
                        lines.push(`G1 X${batchX} Y${batchY.toFixed(4)} F${batchSpeed}`);
                        totalX += batchX;
                        totalY += batchY;
                        batchX = 0;
                        batchY = 0;
                    }
                    if (insertPause) {
                        lines.push("", `; ----- Y轴到达${pausePosMm}mm暂停点 -----`, "M0", "$MD", "M0", "; -------------------------------", "");
                    }
                };
                
                for (let t = 0; t < turns; t++) {
                    const yMove = currentDir * wireDia;
                    batchX += 1;
                    batchY += yMove;
                    
                    let needPause = false;
                    if (pauseAtYWidth && lay === 1 && !pauseInsertedForLayer1) {
                        const futureTotalY = totalY + batchY;
                        const currentAbsY = Math.abs(totalY);
                        const futureAbsY = Math.abs(futureTotalY);
                        const targetAbsY = Math.abs(pauseYWidthValue);
                        if (currentAbsY < targetAbsY && futureAbsY >= targetAbsY) {
                            needPause = true;
                            pauseInsertedForLayer1 = true;
                        }
                    }
                    
                    if (needPause) {
                        flushBatch(false);
                        lines.push("", `; -----【Y轴到达${pauseYWidthValue}mm】-----`, "M0", "$MD", "M0", "; --------------------------", "");
                    }
                }
                flushBatch(false);
                lines.push(`; 层 ${lay} 完成 | 累计X=${totalX}圈 | 累计Y=${totalY.toFixed(3)}mm`);
            }
            
            lines.push("; ==== 绕线完成 ====");
            lines.push("G90 ; 绝对坐标");
            lines.push("M0 ; 绕线完成暂停");
            lines.push("$MD ; 电机除能");
            lines.push("M0 ; 确认停止");
            if (endStayY > 0) {
                lines.push(`G1 Y${endStayY.toFixed(3)} F3000 ; 移动至Y=${endStayY.toFixed(3)}mm`);
            }
            lines.push("M30 ; ==== Gcode 结束 ====");
            return lines.join("\n");
        }
        
        function generateAndSave() {
            hideStatus();
            const wireRaw = $('wdia').value;
            const layersRaw = $('layers').value;
            const widthRaw = $('width').value;
            const feedRaw = $('feed').value;
            
            if (!wireRaw || !layersRaw || !widthRaw || !feedRaw) {
                setStatus("❌ 请完整填写线径、层数、层宽度、默认速度", true);
                return;
            }
            
            const wireDia = parseFloat(wireRaw);
            const totalLayers = parseInt(layersRaw);
            const widthDef = parseFloat(widthRaw);
            const feedDef = parseInt(feedRaw);
            
            if (isNaN(wireDia) || wireDia <= 0 || isNaN(totalLayers) || totalLayers < 1 || isNaN(widthDef) || widthDef <= 0 || isNaN(feedDef) || feedDef <= 0) {
                setStatus("⚠️ 参数无效: 线径/层数/宽度/速度必须为正数", true);
                return;
            }
            
            const pauseRaw = $('pauseLayers').value;
            const specialRaw = $('special').value;
            const endStayY = parseFloat($('endY').value) || 0;
            const negativeStart = $('negStart').checked;
            const pauseAtYWidth = $('pauseAtYWidth').checked;
            const pauseYWidthValue = parseFloat($('pauseYWidth').value) || 1.0;
            
            if (pauseAtYWidth && (pauseYWidthValue <= 0 || isNaN(pauseYWidthValue))) {
                setStatus("⚠️ 请输入有效的Y轴暂停宽度 (>0)", true);
                return;
            }
            
            const pauseLayersArr = parsePauseLayers(pauseRaw, totalLayers);
            const specialMap = parseSpecialLayers(specialRaw);
            
            for (let lay in specialMap) {
                if (parseInt(lay) > totalLayers) {
                    setStatus(`⚠️ 特殊层 ${lay} 超过总层数 ${totalLayers}`, true);
                    return;
                }
                const sp = specialMap[lay];
                if (sp.width <= 0 || sp.feed <= 0) {
                    setStatus(`⚠️ 特殊层 ${lay} 宽度或速度无效`, true);
                    return;
                }
            }
            
            // ========== 自动生成文件名 ==========
            let filename = $('fname').value.trim();
            if (filename === "") {
                filename = autoGenerateFilename(wireDia, totalLayers, widthDef);
                $('fname').value = filename.replace('.txt', '');
            }
            if (!filename.toLowerCase().endsWith('.txt')) filename += '.txt';
            
            const genParams = {
                wireDia, totalLayers, widthDef, feedDef,
                pauseArr: pauseLayersArr,
                specialMap,
                endStayY,
                negativeStart,
                pauseAtYWidth,
                pauseYWidthValue
            };
            
            try {
                const gcodeText = buildGcode(genParams);
                const blob = new Blob([gcodeText], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                setStatus(`✅ 文件 "${filename}" 已生成`, false);
                $('fname').value = '';
            } catch (err) {
                setStatus(`❗ 生成失败: ${err.message}`, true);
            }
        }
        
        // 绑定事件 + 实时预览
        $('genBtn').addEventListener('click', generateAndSave);
        $('wdia').addEventListener('input', updateFileNamePreview);
        $('layers').addEventListener('input', updateFileNamePreview);
        $('width').addEventListener('input', updateFileNamePreview);
        
        updateFileNamePreview();
        statusDiv.style.display = 'none';
    })();
</script>
</body>
</html>
